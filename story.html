<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS — Opening Story</title>
    <link rel="stylesheet" href="story.css" />
    <link rel="stylesheet" href="global.css"/>
</head>

<body>

    <!-- Background gambar — ganti src sesuai file kamu -->
    <div id="bg-layer"></div>
    <canvas id="particles"></canvas>
    <div id="scanlines"></div>

    <!-- HUD corners sama dg splash -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Fade overlay -->
    <div id="t-overlay"></div>

    <!-- PANEL KANAN ATAS: title + narasi + dialog + tombol -->
    <div id="story-panel">

        <!-- Title -->
        <div id="story-title">
            <h1 id="title-nexus">NEXUS</h1>
            <p id="title-sub">ESCAPE LOGIC LAB</p>
        </div>

        <!-- Narasi -->
        <div id="story-text-wrap">
            <div id="story-year">TAHUN 2045</div>
            <div id="story-text"></div>
        </div>

        <!-- Dialog NEXUS-AI -->
        <div id="dialog-box">
            <div id="dialog-av">
                <img src="image/ai.png" alt="NEXUS AI">
            </div>
            <div id="dialog-text">
                ...
            </div>
        </div>

        <!-- Tombol -->
        <div id="btn-row">
            <button class="btn-secondary" id="btnHow">☰ HOW TO PLAY</button>
            <button class="btn-primary" id="btnStart">▶ START GAME</button>
        </div>

    </div>

    <script src="story.js"></script>
</body>

</html>
